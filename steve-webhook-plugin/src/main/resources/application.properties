# ─────────────────────────────────────────────────────
# VoltStartEV Webhook Configuration
# ─────────────────────────────────────────────────────

# Webhook endpoint URL (VoltStartEV backend)
voltstartev.webhook.url=http://localhost:3000/api/webhooks/steve

# Shared secret for HMAC-SHA256 signature (MUST MATCH backend)
voltstartev.webhook.secret=4c89055d36eefb7fd2422483544bd7a39dbb62d06b0b3c04bdc9dd709bf46fc8

# HTTP connection settings
voltstartev.webhook.connect-timeout=3000
voltstartev.webhook.read-timeout=5000
voltstartev.webhook.max-connections=50
voltstartev.webhook.max-connections-per-route=20

# Retry settings
voltstartev.webhook.retry-max-attempts=3
voltstartev.webhook.retry-initial-delay-ms=500

# MeterValues filtering (to reduce event volume)
voltstartev.webhook.meter-values-sampling-enabled=true
voltstartev.webhook.meter-values-min-energy-delta-wh=100
voltstartev.webhook.meter-values-min-interval-seconds=30

# Server
#server.port=8081  # Run plugin on separate port if needed

